<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学習アプリ - 問題</title>
  <link rel="stylesheet" href="css/main.css">
  <script>
    (function(d) {
      var config = { kitId: 'kri1hux', scriptTimeout: 3000, async: true },
      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s);
    })(document);
  </script>
</head>
<body>
  <main class="problem-page">
    <header class="problem-header">
      <h1 class="problem-title">問題</h1>
      <div class="life-display" id="lifeDisplay" aria-label="ライフ 残り3">
        <div class="life-heart" data-index="0" aria-hidden="true">
      <span class="life-heart-inner">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </span>
      <span class="life-heart-placeholder" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </span>
      <span class="life-heart-crack" aria-hidden="true"></span>
    </div>
    <div class="life-heart" data-index="1" aria-hidden="true">
      <span class="life-heart-inner">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </span>
      <span class="life-heart-placeholder" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </span>
      <span class="life-heart-crack" aria-hidden="true"></span>
    </div>
    <div class="life-heart" data-index="2" aria-hidden="true">
      <span class="life-heart-inner">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </span>
      <span class="life-heart-placeholder" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </span>
      <span class="life-heart-crack" aria-hidden="true"></span>
    </div>
      </div>
      <a href="index.html" class="problem-quit-btn" id="btnQuit">ゲームをやめる</a>
    </header>

    <div class="problem-content">
      <p class="problem-text" id="problemText"></p>
      <div class="problem-choices" id="problemChoices"></div>
    </div>

    <!-- 進捗インジケーター -->
    <div class="progress-indicator">
      <div class="progress-track" id="progressTrack">
        <div class="progress-icon" id="progressIcon" aria-hidden="true">
          <!-- テーマに応じてJSで差し替え -->
        </div>
        <span class="progress-goal">ゴール</span>
      </div>
    </div>

    <!-- 正解/不正解フィードバック（オーバーレイなし） -->
    <div class="feedback-badge" id="feedbackBadge" aria-live="polite" aria-hidden="true">
      <div class="feedback-badge__inner" id="feedbackBadgeInner">
        <div class="feedback-correct" id="feedbackCorrect">
        <svg class="correct-circle" viewBox="-15 -15 130 130" aria-hidden="true">
          <circle class="correct-circle-outline" cx="50" cy="50" r="44" fill="none"/>
          <circle class="correct-circle-path" cx="50" cy="50" r="44" fill="none"/>
        </svg>
        <div class="clear-light" id="clearLight" aria-hidden="true"></div>
        <span class="correct-text" id="correctText"></span>
        <div class="correct-stars" id="correctStars"></div>
        </div>
        <div class="feedback-incorrect" id="feedbackIncorrect">
        <svg class="incorrect-x" viewBox="0 0 100 100" aria-hidden="true">
          <path class="incorrect-x-outline" d="M 22 22 L 78 78"/>
          <path class="incorrect-x-outline" d="M 78 22 L 22 78"/>
          <path class="incorrect-x-path" d="M 22 22 L 78 78"/>
          <path class="incorrect-x-path" d="M 78 22 L 22 78"/>
        </svg>
        <span class="incorrect-text" id="incorrectText"></span>
        </div>
        <span class="feedback-icon" id="feedbackIcon"></span>
        <span class="feedback-text" id="feedbackText"></span>
        <a href="#" class="btn-top feedback-btn" id="btnTop">TOPに戻る</a>
      </div>
    </div>

    <!-- クリア時のみ：紙吹雪 -->
    <div class="confetti-layer" id="confettiLayer" aria-hidden="true">
      <div class="confetti-container" id="confettiContainer"></div>
    </div>
  </main>

  <script src="js/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/CustomEase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/Physics2DPlugin.min.js"></script>
  <script src="js/problem.js"></script>
</body>
</html>
